changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - fix
        - bug
    - title: Documentation
      labels:
        - docs
    - title: Maintenance
      labels:
        - chore
        - refactor
        - ci
    - title: Other Changes
      labels:
        - "*"
  change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
  template: |
    ## What's Changed
    $CHANGES

    ## Quick Update Steps
    1. Update files and restart `agent.py`.
    2. Re-import the Figma plugin if `plugin/code.js` changed.
    3. Verify serial port/baud settings if behavior changed.
